name: Commit Stage
on: push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/quote-service
  VERSION: ${{ github.sha }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up GraalVM
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 21
          cache: gradle
      - name: Build and test
        run: |
          chmod +x gradlew
          ./gradlew build
      - name: Log into container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push native image
        run: |
          ./gradlew bootBuildImage \
            -PimageName=${{ env.IMAGE_NAME }}:${{ env.VERSION }} \
            -PregistryUsername=${{ github.actor }} \
            -PregistryToken=${{ secrets.GITHUB_TOKEN }} \
            -PregistryUrl=${{ env.REGISTRY }} \
            -PbuilderImage=paketobuildpacks/builder-jammy:tiny